name: unearthed_coal_mines
description: >
  Federal coal mine and power plant data from MSHA and EIA.
  Covers US coal mines, their quarterly production, fuel shipments to power plants,
  and plant details including location and eGRID subregion.

tables:
  - name: MSHA_MINES
    description: >
      Registry of all US mines from MSHA. Filtered to coal (COAL_METAL_IND = "C").
      Contains mine location, operator, status, and type.
      Note: all string fields contain embedded double quotes that must be stripped with REPLACE(col, '"', '').
    base_table:
      database: UNEARTHED_DB
      schema: RAW
      table: MSHA_MINES
    primary_key:
      columns:
        - mine_id
    filters:
      - name: coal_mines_only
        expr: REPLACE(COAL_METAL_IND, '"', '') = 'C'
        description: Only coal mines
    dimensions:
      - name: mine_id
        description: MSHA mine identifier (unique per mine)
        expr: TRY_TO_NUMBER(REPLACE(MINE_ID, '"', ''))
        data_type: NUMBER
      - name: mine_name
        synonyms:
          - mine
          - mine name
          - pit
          - colliery
        description: >
          Current name of the mine. Use ILIKE with a trailing wildcard
          when matching a short form of the name (e.g. 'Bailey%').
        expr: TRIM(REPLACE(CURRENT_MINE_NAME, '"', ''))
        data_type: VARCHAR
        sample_values:
          - Bailey Mine
          - Black Thunder
          - North Antelope Rochelle Mine
          - Buckingham Mine No. 6
          - Marshall County Mine
          - Century Mine
          - Enlow Fork Mine
      - name: mine_operator
        synonyms:
          - operator
          - company
          - owner
          - mining company
        description: Current operator of the mine
        expr: TRIM(REPLACE(CURRENT_OPERATOR_NAME, '"', ''))
        data_type: VARCHAR
        sample_values:
          - Consol Pennsylvania Coal Company
          - Peabody Powder River Mining LLC
          - Arch Resources WY LLC
          - Murray American Energy Inc
      - name: mine_state
        synonyms:
          - state
          - us state
        description: Two-letter US state code where the mine is located (e.g. 'WY', 'WV', 'KY')
        expr: TRIM(REPLACE(STATE, '"', ''))
        data_type: VARCHAR
        sample_values:
          - WY
          - WV
          - KY
          - PA
          - IL
          - MT
      - name: mine_county
        description: County where the mine is located
        expr: TRIM(REPLACE(FIPS_CNTY_NM, '"', ''))
        data_type: VARCHAR
      - name: mine_type
        description: >
          Type of mine: Surface, Underground, or Facility.
          Raw values are quoted strings.
        expr: TRIM(REPLACE(CURRENT_MINE_TYPE, '"', ''))
        data_type: VARCHAR
      - name: mine_status
        description: >
          Current operating status: Active, Abandoned, etc.
        expr: TRIM(REPLACE(CURRENT_MINE_STATUS, '"', ''))
        data_type: VARCHAR
      - name: mine_latitude
        description: Latitude of the mine
        expr: TRY_TO_DOUBLE(REPLACE(LATITUDE, '"', ''))
        data_type: FLOAT
      - name: mine_longitude
        description: Longitude of the mine
        expr: TRY_TO_DOUBLE(REPLACE(LONGITUDE, '"', ''))
        data_type: FLOAT

  - name: MSHA_QUARTERLY_PRODUCTION
    description: >
      Quarterly coal production data per mine from MSHA.
      COAL_PRODUCTION is in short tons. CAL_YR and CAL_QTR identify the period.
      Note: COAL_METAL_IND contains embedded double quotes.
    base_table:
      database: UNEARTHED_DB
      schema: RAW
      table: MSHA_QUARTERLY_PRODUCTION
    filters:
      - name: coal_production_only
        expr: REPLACE(COAL_METAL_IND, '"', '') = 'C'
        description: Only coal production records
    dimensions:
      - name: mine_id
        description: MSHA mine identifier, joins to MSHA_MINES
        expr: TRY_TO_NUMBER(REPLACE(MINE_ID, '"', ''))
        data_type: NUMBER
      - name: year
        description: Calendar year
        expr: CAL_YR
        data_type: NUMBER
      - name: quarter
        description: Calendar quarter (1-4)
        expr: CAL_QTR
        data_type: NUMBER
    measures:
      - name: coal_production_tons
        description: Coal production in short tons
        expr: SUM(COAL_PRODUCTION)
        data_type: NUMBER
      - name: avg_employee_count
        description: Average number of employees
        expr: AVG(AVG_EMPLOYEE_CNT)
        data_type: NUMBER
      - name: hours_worked
        description: Total hours worked
        expr: SUM(HOURS_WORKED)
        data_type: NUMBER

  - name: EIA_923_FUEL_RECEIPTS
    description: >
      Coal shipments from mines to power plants in 2024, from EIA Form 923.
      QUANTITY is in short tons (stored as VARCHAR with commas, must be cleaned).
      COALMINE_MSHA_ID joins to MSHA_MINES.MINE_ID. PLANT_ID joins to EIA_860_PLANTS.PLANTCODE.
    base_table:
      database: UNEARTHED_DB
      schema: RAW
      table: EIA_923_FUEL_RECEIPTS
    filters:
      - name: coal_fuel_only
        expr: FUEL_GROUP = 'Coal'
        description: Only coal fuel receipts
    dimensions:
      - name: plant_id
        description: EIA plant identifier
        expr: PLANT_ID
        data_type: NUMBER
      - name: plant_name
        synonyms:
          - plant
          - power plant
          - facility
          - generating station
        description: Name of the receiving power plant
        expr: PLANT_NAME
        data_type: VARCHAR
        sample_values:
          - Cross
          - Gavin
          - Bruce Mansfield
          - Rockport
          - Cardinal
          - Mountaineer
      - name: plant_state
        synonyms:
          - plant state
        description: Two-letter state code of the receiving power plant
        expr: PLANT_STATE
        data_type: VARCHAR
      - name: coalmine_msha_id
        description: MSHA mine ID of the source mine (cast to NUMBER to match MSHA_MINES.mine_id)
        expr: TRY_TO_NUMBER(COALMINE_MSHA_ID)
        data_type: NUMBER
      - name: coalmine_name
        description: Name of the source coal mine
        expr: COALMINE_NAME
        data_type: VARCHAR
      - name: supplier
        description: Coal supplier/broker name
        expr: SUPPLIER
        data_type: VARCHAR
      - name: year
        description: Year of the shipment
        expr: YEAR
        data_type: NUMBER
      - name: month
        description: Month of the shipment
        expr: MONTH
        data_type: NUMBER
    measures:
      - name: quantity_tons
        description: Quantity of coal shipped in short tons
        expr: SUM(TRY_TO_NUMBER(REPLACE(QUANTITY, ',', ''), 18, 1))
        data_type: NUMBER

  - name: EIA_860_PLANTS
    description: >
      US power plant registry from EIA Form 860 (2024).
      Contains plant location, operator, and grid details.
      PLANTCODE joins to EIA_923_FUEL_RECEIPTS.PLANT_ID.
    base_table:
      database: UNEARTHED_DB
      schema: RAW
      table: EIA_860_PLANTS
    primary_key:
      columns:
        - plant_code
    dimensions:
      - name: plant_code
        description: EIA plant identifier
        expr: PLANTCODE
        data_type: NUMBER
      - name: plant_name
        description: Name of the power plant
        expr: PLANTNAME
        data_type: VARCHAR
      - name: state
        description: State where the plant is located
        expr: STATE
        data_type: VARCHAR
      - name: county
        description: County where the plant is located
        expr: COUNTY
        data_type: VARCHAR
      - name: latitude
        description: Plant latitude
        expr: LATITUDE
        data_type: FLOAT
      - name: longitude
        description: Plant longitude
        expr: LONGITUDE
        data_type: FLOAT

  - name: PLANT_SUBREGION_LOOKUP
    description: >
      Mapping of EIA plant codes to EPA eGRID subregion IDs.
      Derived from point-in-polygon of plant coordinates against eGRID subregion boundaries.
    base_table:
      database: UNEARTHED_DB
      schema: RAW
      table: PLANT_SUBREGION_LOOKUP
    primary_key:
      columns:
        - plant_code
    dimensions:
      - name: plant_code
        description: EIA plant identifier, joins to EIA_860_PLANTS.PLANTCODE
        expr: PLANT_CODE
        data_type: NUMBER
      - name: egrid_subregion
        description: EPA eGRID subregion code (e.g. SRVC, RFCW, MROW)
        expr: EGRID_SUBREGION
        data_type: VARCHAR

  - name: MSHA_ACCIDENTS
    description: >
      Accidents, injuries, and fatalities at US mines from MSHA.
      Each row is one incident. DEGREE_INJURY classifies severity
      (FATALITY, DAYS AWAY FROM WORK ONLY, etc). NARRATIVE contains
      a free-text description of what happened. Joins to MSHA_MINES
      via MINE_ID.
    base_table:
      database: UNEARTHED_DB
      schema: RAW
      table: MSHA_ACCIDENTS
    filters:
      - name: coal_accidents_only
        expr: REPLACE(COAL_METAL_IND, '"', '') = 'C'
        description: Only coal mine accidents
    dimensions:
      - name: mine_id
        description: MSHA mine identifier, joins to MSHA_MINES
        expr: TRY_TO_NUMBER(REPLACE(MINE_ID, '"', ''))
        data_type: NUMBER
      - name: accident_date
        description: Date of the accident
        expr: TRY_TO_DATE(REPLACE(ACCIDENT_DT, '"', ''), 'MM/DD/YYYY')
        data_type: DATE
      - name: year
        description: Calendar year of the accident
        expr: CAL_YR
        data_type: NUMBER
      - name: degree_injury
        description: >
          Severity classification. Key values: FATALITY, DAYS AWAY FROM WORK ONLY,
          PERM TOT OR PERM PRTL DISABLTY, DAYS RESTRICTED ACTIVITY ONLY.
        expr: TRIM(REPLACE(DEGREE_INJURY, '"', ''))
        data_type: VARCHAR
      - name: occupation
        description: Job title of the injured worker
        expr: TRIM(REPLACE(OCCUPATION, '"', ''))
        data_type: VARCHAR
      - name: narrative
        description: Free-text description of what happened in the accident
        expr: TRIM(REPLACE(NARRATIVE, '"', ''))
        data_type: VARCHAR
      - name: classification
        description: Type of accident (e.g. Powered Haulage, Fall of Roof)
        expr: TRIM(REPLACE(CLASSIFICATION, '"', ''))
        data_type: VARCHAR
      - name: injury_source
        description: Object or substance that caused the injury
        expr: TRIM(REPLACE(INJURY_SOURCE, '"', ''))
        data_type: VARCHAR
    measures:
      - name: incident_count
        description: Total number of accident/injury incidents
        expr: COUNT(*)
        data_type: NUMBER
      - name: fatality_count
        description: Number of fatalities
        expr: SUM(CASE WHEN TRIM(REPLACE(DEGREE_INJURY, '"', '')) = 'FATALITY' THEN 1 ELSE 0 END)
        data_type: NUMBER
      - name: days_lost
        description: Total days of work lost due to injuries
        expr: SUM(TRY_TO_NUMBER(REPLACE(DAYS_LOST, '"', '')))
        data_type: NUMBER

relationships:
  - name: receipts_to_mines
    left_table: EIA_923_FUEL_RECEIPTS
    right_table: MSHA_MINES
    join_type: left_outer
    relationship_columns:
      - left_column: coalmine_msha_id
        right_column: mine_id
  - name: receipts_to_plants
    left_table: EIA_923_FUEL_RECEIPTS
    right_table: EIA_860_PLANTS
    join_type: inner
    relationship_columns:
      - left_column: plant_id
        right_column: plant_code
  - name: plants_to_subregions
    left_table: EIA_860_PLANTS
    right_table: PLANT_SUBREGION_LOOKUP
    join_type: inner
    relationship_columns:
      - left_column: plant_code
        right_column: plant_code
  - name: production_to_mines
    left_table: MSHA_QUARTERLY_PRODUCTION
    right_table: MSHA_MINES
    join_type: inner
    relationship_columns:
      - left_column: mine_id
        right_column: mine_id
  - name: accidents_to_mines
    left_table: MSHA_ACCIDENTS
    right_table: MSHA_MINES
    join_type: inner
    relationship_columns:
      - left_column: mine_id
        right_column: mine_id

verified_queries:
  - name: mine_production_since_year
    question: "How much has Bailey Mine produced since 2020?"
    sql: >
      SELECT SUM(COAL_PRODUCTION) AS total_tons
      FROM UNEARTHED_DB.RAW.MSHA_QUARTERLY_PRODUCTION
      WHERE TRY_TO_NUMBER(REPLACE(MINE_ID, '"', '')) IN (
        SELECT TRY_TO_NUMBER(REPLACE(MINE_ID, '"', ''))
        FROM UNEARTHED_DB.RAW.MSHA_MINES
        WHERE TRIM(REPLACE(CURRENT_MINE_NAME, '"', '')) ILIKE 'Bailey%'
          AND REPLACE(COAL_METAL_IND, '"', '') = 'C'
      )
      AND CAL_YR >= 2020
      AND REPLACE(COAL_METAL_IND, '"', '') = 'C'

  - name: plants_buying_from_operator
    question: "What other plants buy from Consol Pennsylvania Coal Company?"
    sql: >
      SELECT DISTINCT fr.PLANT_NAME, fr.PLANT_STATE,
        SUM(TRY_TO_NUMBER(REPLACE(fr.QUANTITY, ',', ''), 18, 1)) AS total_tons
      FROM UNEARTHED_DB.RAW.EIA_923_FUEL_RECEIPTS fr
      JOIN UNEARTHED_DB.RAW.MSHA_MINES m
        ON TRY_TO_NUMBER(fr.COALMINE_MSHA_ID) = TRY_TO_NUMBER(REPLACE(m.MINE_ID, '"', ''))
      WHERE TRIM(REPLACE(m.CURRENT_OPERATOR_NAME, '"', '')) ILIKE 'Consol Pennsylvania%'
        AND fr.FUEL_GROUP = 'Coal'
        AND fr.YEAR = 2024
      GROUP BY fr.PLANT_NAME, fr.PLANT_STATE
      ORDER BY total_tons DESC

  - name: is_mine_active
    question: "Is Bailey Mine still active?"
    sql: >
      SELECT TRIM(REPLACE(CURRENT_MINE_NAME, '"', '')) AS mine_name,
        TRIM(REPLACE(CURRENT_MINE_STATUS, '"', '')) AS mine_status,
        TRIM(REPLACE(CURRENT_MINE_TYPE, '"', '')) AS mine_type,
        TRIM(REPLACE(CURRENT_OPERATOR_NAME, '"', '')) AS operator
      FROM UNEARTHED_DB.RAW.MSHA_MINES
      WHERE TRIM(REPLACE(CURRENT_MINE_NAME, '"', '')) ILIKE 'Bailey%'
        AND REPLACE(COAL_METAL_IND, '"', '') = 'C'

  - name: total_tonnage_for_subregion
    question: "What is the total coal tonnage for SRVC in 2024?"
    sql: >
      SELECT lk.EGRID_SUBREGION,
        SUM(TRY_TO_NUMBER(REPLACE(fr.QUANTITY, ',', ''), 18, 1)) AS total_tons
      FROM UNEARTHED_DB.RAW.EIA_923_FUEL_RECEIPTS fr
      JOIN UNEARTHED_DB.RAW.PLANT_SUBREGION_LOOKUP lk
        ON fr.PLANT_ID = lk.PLANT_CODE
      WHERE fr.FUEL_GROUP = 'Coal'
        AND fr.YEAR = 2024
        AND lk.EGRID_SUBREGION = 'SRVC'
      GROUP BY lk.EGRID_SUBREGION

  - name: largest_supplier_in_state
    question: "Who is the largest coal supplier in Wyoming?"
    sql: >
      SELECT TRIM(REPLACE(m.CURRENT_OPERATOR_NAME, '"', '')) AS operator,
        SUM(COAL_PRODUCTION) AS total_production_tons
      FROM UNEARTHED_DB.RAW.MSHA_QUARTERLY_PRODUCTION p
      JOIN UNEARTHED_DB.RAW.MSHA_MINES m
        ON TRY_TO_NUMBER(REPLACE(p.MINE_ID, '"', '')) = TRY_TO_NUMBER(REPLACE(m.MINE_ID, '"', ''))
      WHERE TRIM(REPLACE(m.STATE, '"', '')) = 'WY'
        AND REPLACE(m.COAL_METAL_IND, '"', '') = 'C'
        AND REPLACE(p.COAL_METAL_IND, '"', '') = 'C'
        AND p.CAL_YR = 2024
      GROUP BY TRIM(REPLACE(m.CURRENT_OPERATOR_NAME, '"', ''))
      ORDER BY total_production_tons DESC
      LIMIT 1

  - name: fatalities_at_mine
    question: "How many fatalities at Black Thunder mine?"
    sql: >
      SELECT TRIM(REPLACE(m.CURRENT_MINE_NAME, '"', '')) AS mine_name,
        SUM(CASE WHEN TRIM(REPLACE(a.DEGREE_INJURY, '"', '')) = 'FATALITY'
          THEN 1 ELSE 0 END) AS fatalities,
        COUNT(*) AS total_incidents
      FROM UNEARTHED_DB.RAW.MSHA_ACCIDENTS a
      JOIN UNEARTHED_DB.RAW.MSHA_MINES m
        ON TRY_TO_NUMBER(REPLACE(a.MINE_ID, '"', '')) = TRY_TO_NUMBER(REPLACE(m.MINE_ID, '"', ''))
      WHERE TRIM(REPLACE(m.CURRENT_MINE_NAME, '"', '')) ILIKE 'Black Thunder%'
        AND REPLACE(m.COAL_METAL_IND, '"', '') = 'C'
        AND REPLACE(a.COAL_METAL_IND, '"', '') = 'C'
      GROUP BY TRIM(REPLACE(m.CURRENT_MINE_NAME, '"', ''))

  - name: production_by_mine_since_year
    question: "How much has Black Thunder produced since 2020?"
    sql: >
      SELECT TRIM(REPLACE(m.CURRENT_MINE_NAME, '"', '')) AS mine_name,
        SUM(p.COAL_PRODUCTION) AS total_tons
      FROM UNEARTHED_DB.RAW.MSHA_QUARTERLY_PRODUCTION p
      JOIN UNEARTHED_DB.RAW.MSHA_MINES m
        ON TRY_TO_NUMBER(REPLACE(p.MINE_ID, '"', '')) = TRY_TO_NUMBER(REPLACE(m.MINE_ID, '"', ''))
      WHERE TRIM(REPLACE(m.CURRENT_MINE_NAME, '"', '')) ILIKE 'Black Thunder%'
        AND p.CAL_YR >= 2020
        AND REPLACE(m.COAL_METAL_IND, '"', '') = 'C'
        AND REPLACE(p.COAL_METAL_IND, '"', '') = 'C'
      GROUP BY TRIM(REPLACE(m.CURRENT_MINE_NAME, '"', ''))

  - name: mines_supplying_plant
    question: "Which mines supplied Cross in 2024? Rank by tonnage."
    sql: >
      SELECT fr.COALMINE_NAME,
        TRIM(REPLACE(m.CURRENT_OPERATOR_NAME, '"', '')) AS operator,
        TRIM(REPLACE(m.STATE, '"', '')) AS state,
        SUM(TRY_TO_NUMBER(REPLACE(fr.QUANTITY, ',', ''), 18, 1)) AS total_tons
      FROM UNEARTHED_DB.RAW.EIA_923_FUEL_RECEIPTS fr
      LEFT JOIN UNEARTHED_DB.RAW.MSHA_MINES m
        ON TRY_TO_NUMBER(fr.COALMINE_MSHA_ID)
           = TRY_TO_NUMBER(REPLACE(m.MINE_ID, '"', ''))
      WHERE fr.PLANT_NAME ILIKE 'Cross%'
        AND fr.FUEL_GROUP = 'Coal'
        AND fr.YEAR = 2024
      GROUP BY fr.COALMINE_NAME,
        TRIM(REPLACE(m.CURRENT_OPERATOR_NAME, '"', '')),
        TRIM(REPLACE(m.STATE, '"', ''))
      ORDER BY total_tons DESC

  - name: is_mine_active_black_thunder
    question: "Is Black Thunder still active?"
    sql: >
      SELECT TRIM(REPLACE(CURRENT_MINE_NAME, '"', '')) AS mine_name,
        TRIM(REPLACE(CURRENT_MINE_STATUS, '"', '')) AS mine_status,
        TRIM(REPLACE(CURRENT_MINE_TYPE, '"', '')) AS mine_type,
        TRIM(REPLACE(CURRENT_OPERATOR_NAME, '"', '')) AS operator,
        TRIM(REPLACE(STATE, '"', '')) AS state
      FROM UNEARTHED_DB.RAW.MSHA_MINES
      WHERE TRIM(REPLACE(CURRENT_MINE_NAME, '"', '')) ILIKE 'Black Thunder%'
        AND REPLACE(COAL_METAL_IND, '"', '') = 'C'
